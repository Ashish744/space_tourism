<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | CosmosVoyage</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background:
        radial-gradient(circle at top, rgba(106,61,232,0.12), transparent 18%),
        linear-gradient(135deg, #02050d, #0a0f25 60%, #111a3d);
      color: #eef3ff;
      min-height: 100vh;
      cursor: none;
      overflow-x: hidden;
    }
    .cursor, .cursor-ring { position: fixed; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); }
    .cursor { width: 8px; height: 8px; background: #c9933a; border-radius: 50%; }
    .cursor-ring { width: 38px; height: 38px; border: 1px solid rgba(201,147,58,0.5); border-radius: 50%; }
    .cursor.hover { width: 6px; height: 6px; background: #c9933a; }
    .cursor-ring.hover { width: 52px; height: 52px; border-color: #e8b86d; }
    .login-wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 16px;
    }
    .login-card {
      width: min(460px, 100%);
      background: linear-gradient(180deg, rgba(13,27,69,0.88), rgba(10,15,37,0.98));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 40px 32px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.45);
    }
    .logo {
      display: inline-block;
      margin-bottom: 18px;
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #c9933a;
    }
    h1 {
      font-family: Georgia, serif;
      font-size: 42px;
      margin-bottom: 8px;
    }
    p { color: #8b9cc8; margin-bottom: 24px; }
    label { display: block; font-size: 13px; color: #cfd8ff; margin-bottom: 8px; }
    input {
      width: 100%;
      padding: 14px 16px;
      margin-bottom: 16px;
      background: #0a0f25;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      color: #eef3ff;
      outline: none;
    }
    input:focus { border-color: #6a3de8; box-shadow: 0 0 0 3px rgba(106,61,232,0.15); }
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(90deg, #6a3de8, #8b5ff5);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease;
    }
    .btn:hover { transform: translateY(-1px); }
    .row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
    .row a { color: #8b9cc8; font-size: 13px; text-decoration: none; }
    .note { margin-top: 18px; text-align: center; color: #8b9cc8; font-size: 13px; }
    .note a { color: #e8b86d; }
    .password-wrap { position: relative; }
    .password-wrap input { padding-right: 64px; }
    .toggle-password {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      color: #8b9cc8;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }
    .field-hint {
      font-size: 12px;
      color: #8b9cc8;
      margin: -8px 0 12px;
    }
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(2, 5, 13, 0.78);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 1000;
    }
    .modal-overlay.show { display: flex; }
    .modal-card {
      width: min(520px, 100%);
      background: linear-gradient(180deg, rgba(13,27,69,0.96), rgba(10,15,37,0.98));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.6);
    }
    .modal-card h2 { font-family: Georgia, serif; font-size: 32px; margin-bottom: 8px; }
    .modal-card p { margin-bottom: 18px; }
    .modal-close {
      position: absolute;
      top: 14px;
      right: 14px;
      background: none;
      border: none;
      color: #8b9cc8;
      font-size: 18px;
      cursor: pointer;
    }
    @media (max-width: 520px) {
      .login-card { padding: 32px 22px; }
      h1 { font-size: 34px; }
      .modal-card { padding: 24px 18px; }
    }
</style>
</head>
<body>
  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <main class="login-wrap">
    <section class="login-card">
      <a href="index.html" style="display:flex; align-items:center; justify-content:center; margin-bottom:12px;">
        <img src="logo (1).webp" alt="CosmosVoyage logo" style="height:86px; width:auto; object-fit:contain; display:block;">
      </a>
      <h1>Welcome back</h1>
      <p>Sign in to continue your mission booking</p>
      <form id="loginForm">
        <label for="loginEmail">Email</label>
        <input id="loginEmail" type="email" placeholder="you@example.com" required />
        <label for="loginPassword">Password</label>
        <div class="password-wrap">
          <input id="loginPassword" type="password" placeholder="••••••••" required minlength="8" />
          <button type="button" class="toggle-password" data-target="loginPassword">Show</button>
        </div>
        <button class="btn" type="submit">Login</button>
      </form>
      <div class="row">
        <a href="404.html">Forgot password?</a>
      </div>
      <p class="note">New traveler? <button id="openModal" style="background:none;border:none;color:#e8b86d;cursor:pointer;">Create account</button></p>
    </section>
  </main>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-card" style="position:relative;">
      <button class="modal-close" id="closeModal" aria-label="Close">×</button>
      <h2>Create account</h2>
      <p style="color:#8b9cc8;">Create your traveler profile to continue booking.</p>
      <form id="signupForm">
        <label for="fullName">Full Name</label>
        <input id="fullName" type="text" placeholder="Jane Doe" required />
        <label for="signupEmail">Email</label>
        <input id="signupEmail" type="email" placeholder="you@example.com" required />
        <label for="phone">Phone</label>
        <input id="phone" type="text" placeholder="+1 555 010 2048" required />
        <label for="signupPassword">Password</label>
        <div class="password-wrap">
          <input id="signupPassword" type="password" placeholder="••••••••" required minlength="8" />
          <button type="button" class="toggle-password" data-target="signupPassword">Show</button>
        </div>
        <div class="field-hint">Minimum 8 characters</div>
        <label for="confirmPassword">Confirm Password</label>
        <div class="password-wrap">
          <input id="confirmPassword" type="password" placeholder="••••••••" required minlength="8" />
          <button type="button" class="toggle-password" data-target="confirmPassword">Show</button>
        </div>
        <button class="btn" type="submit">Create account</button>
      </form>
    </div>
  </div>

  <script>
    const cursor = document.getElementById('cursor');
    const cursorRing = document.getElementById('cursorRing');
    let cx = 0, cy = 0, rx = 0, ry = 0;

    document.addEventListener('mousemove', e => {
      cx = e.clientX;
      cy = e.clientY;
      cursor.style.left = cx + 'px';
      cursor.style.top = cy + 'px';
    });

    function animRing() {
      rx += (cx - rx) * 0.12;
      ry += (cy - ry) * 0.12;
      cursorRing.style.left = rx + 'px';
      cursorRing.style.top = ry + 'px';
      requestAnimationFrame(animRing);
    }
    animRing();

    document.querySelectorAll('a, button, input').forEach(el => {
      el.addEventListener('mouseenter', () => {
        cursor.classList.add('hover');
        cursorRing.classList.add('hover');
      });
      el.addEventListener('mouseleave', () => {
        cursor.classList.remove('hover');
        cursorRing.classList.remove('hover');
      });
    });

    const modalOverlay = document.getElementById('modalOverlay');
    const openModalBtn = document.getElementById('openModal');
    const closeModalBtn = document.getElementById('closeModal');

    openModalBtn.addEventListener('click', () => modalOverlay.classList.add('show'));
    closeModalBtn.addEventListener('click', () => modalOverlay.classList.remove('show'));
    modalOverlay.addEventListener('click', (e) => {
      if (e.target === modalOverlay) modalOverlay.classList.remove('show');
    });

    document.querySelectorAll('.toggle-password').forEach(btn => {
      btn.addEventListener('click', () => {
        const targetId = btn.getAttribute('data-target');
        const input = document.getElementById(targetId);
        if (!input) return;
        const isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        btn.textContent = isHidden ? 'Hide' : 'Show';
      });
    });

    function isLettersOnly(value) {
      return /^[A-Za-z\s]+$/.test(value);
    }

    function isValidPhone(value) {
      return /^[0-9+\-\s()]+$/.test(value);
    }

    function isValidEmail(value) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
    }

    document.querySelectorAll('input[type="email"]').forEach(input => {
      input.addEventListener('input', () => input.setCustomValidity(''));
    });
    document.querySelectorAll('input[type="password"]').forEach(input => {
      input.addEventListener('input', () => input.setCustomValidity(''));
    });

    document.getElementById('signupForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const fullName = document.getElementById('fullName').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const password = document.getElementById('signupPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (!isLettersOnly(fullName)) {
        alert('Full name should contain letters only.');
        return;
      }
      if (!isValidEmail(email)) {
        const emailInput = document.getElementById('signupEmail');
        emailInput.setCustomValidity('Please enter a valid email address.');
        emailInput.reportValidity();
        return;
      }
      if (!isValidPhone(phone)) {
        alert('Phone number should contain only numbers, spaces, +, -, or parentheses.');
        return;
      }
      if (password.length < 8) {
        const passwordInput = document.getElementById('signupPassword');
        passwordInput.setCustomValidity('Password must be at least 8 characters long.');
        passwordInput.reportValidity();
        return;
      }
      if (password !== confirmPassword) {
        const confirmInput = document.getElementById('confirmPassword');
        confirmInput.setCustomValidity('Passwords do not match.');
        confirmInput.reportValidity();
        return;
      }

      localStorage.setItem('cosmosLoggedIn', 'true');
      localStorage.setItem('cosmosUser', JSON.stringify({ fullName, email, phone }));
      modalOverlay.classList.remove('show');
      window.location.href = 'login.html';
    });

    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value.trim();
      const loginPasswordInput = document.getElementById('loginPassword');
      if (!isValidEmail(email)) {
        const emailInput = document.getElementById('loginEmail');
        emailInput.setCustomValidity('Please enter a valid email address.');
        emailInput.reportValidity();
        return;
      }
      if (password.length < 8) {
        loginPasswordInput.setCustomValidity('Password must be at least 8 characters long.');
        loginPasswordInput.reportValidity();
        loginPasswordInput.focus();
        return;
      }
      if (email && password) {
        localStorage.setItem('cosmosLoggedIn', 'true');
        window.location.href = 'dashboard.html';
      }
    });
  </script>
</body>
</html>
